[header]
name = "person test set"
target = "person"
desc = "minimal person name primitives"
author = "aethellib"
version = "0.1"

[name]
first = ["al", "ra", "jo", "el"]
middle = ["an", "is", "or"]
last = ["ton", "ric", "den", "vale"]


[rules]
name = { rule = "scramble", combine = [
    "first",
    "middle",
    "last",
], chance = { first = 100, middle = 30, last = 90 } }
