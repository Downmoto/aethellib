[header]
title = "person test set"
target = "person"
desc = "minimal person name primitives"
author = "aethellib"
version = "0.1"
schema = "01"

[name]
outputs = ["name"]
rules = [
    { for = "name", rule = "scramble", sample_count = [
        1,
        3,
    ], from = [
        "first",
        "middle",
        "last",
    ] },
]

first = ["al", "ra", "jo", "el"]
middle = ["an", "is", "or"]
last = ["ton", "ric", "den", "vale"]
